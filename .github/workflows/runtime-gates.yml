name: runtime-gates

# The runtime/ engine static gates. Fast (no Nix, no artifacts) — runs on every
# change under runtime/. All four CLAUDE.md gates: engine unit tests (bun:test),
# tsc typecheck, oxlint, and oxfmt --check. The vendored bundles under
# demo/web/vendor/ are excluded via .prettierignore (oxfmt) and .oxlintrc.json
# (oxlint); *.test.js are excluded from the tsc include (they import "bun:test").
on:
  push:
    branches: [master, 'claude/**']
    paths:
      - 'runtime/**'
      - '.github/workflows/runtime-gates.yml'
  pull_request:
    paths:
      - 'runtime/**'
      - '.github/workflows/runtime-gates.yml'
  workflow_dispatch:

jobs:
  gates:
    name: engine tests + typecheck + lint + format
    # Namespace small runner — keeps this off GitHub-hosted minutes (private repo).
    runs-on: namespace-profile-default
    timeout-minutes: 15
    defaults:
      run:
        working-directory: runtime
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install deps
        run: bun install --frozen-lockfile

      # Engine unit tests (ninep + nix-store): 72 tests, no artifacts needed.
      - name: Engine unit tests
        run: bun run test

      # tsc -p jsconfig.json. *.test.js are excluded from the typecheck include
      # (they import "bun:test", which tsc can't resolve) — see jsconfig.json.
      - name: Typecheck
        run: bun run typecheck

      # oxlint --max-warnings 0 (vendored dirs excluded via .oxlintrc.json).
      - name: Lint
        run: bun run lint

      # oxfmt --check (vendored dirs excluded via .prettierignore).
      - name: Format check
        run: bun run format:check
