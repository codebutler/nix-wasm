name: nix-wasm

# Phase 5 (#2): build every wasm artifact from source on x86_64-linux and push the
# results to the nix-wasm Cachix cache. This is the binary-cache backend decision
# from the issue ("CI host + cache backend"): Cachix is the Nix *store* cache —
# a substituter (warm reruns + the guest pulling prebuilt wasm) AND a push target
# (every store path realised in a job is uploaded). It is content-addressed by
# store-path hash, so there is no manual cache-key bookkeeping: a flake.lock or
# patches/ change moves the hashes and self-invalidates.
#
# The two from-source LLVM builds (guest-clang and the kernel's patched LLVM,
# ~1-2h each cold) are the long pole. They run on their own runners in the
# `toolchain` matrix so each stays under the 6h hosted-runner job limit and the
# two LLVMs compile in parallel; the cheaper `artifacts` job then SUBSTITUTES them
# from Cachix instead of rebuilding. A cold cache pays the full LLVM rebuild once;
# every run after substitutes in minutes.
#
# Cache backend: nix-wasm.cachix.org (public read; signing key
# nix-wasm.cachix.org-1:UlXbCihIfmQnzcyTQuRutvD0IPVVoHHAoIamxBJZUb0=). Pushing
# requires the CACHIX_AUTH_TOKEN repo secret; without it (e.g. fork PRs) the jobs
# still substitute from the public cache, they just don't push.

on:
  push:
    branches: [master, 'claude/**']
    paths:
      - 'flake.nix'
      - 'flake.lock'
      - '**/*.nix'
      - 'patches/**'
      # The boot-smoke / nix-boot-smoke jobs run the runtime engine + the
      # demo/node smoke scripts, so a change to either must re-validate them
      # (kernel/toolchain substitute from Cachix when their inputs are unchanged).
      - 'runtime/**'
      - '.rebuild-request'
      - '.github/workflows/nix-wasm.yml'
  pull_request:
    paths:
      - 'flake.nix'
      - 'flake.lock'
      - '**/*.nix'
      - 'patches/**'
      - 'runtime/**'
      - '.github/workflows/nix-wasm.yml'
  workflow_dispatch:

concurrency:
  group: nix-wasm-${{ github.ref }}
  # Supersede an in-flight run on a newer push. Safe for a cache-populating build:
  # cachix-action pushes each derivation as it finishes (post-build-hook), so a
  # cancelled run's completed paths are already in Cachix and the new run just
  # substitutes them — no lost work, no double-building the slow poles.
  cancel-in-progress: true

jobs:
  # --- the heavy from-source LLVM builds, one runner each, pushed to Cachix ----
  toolchain:
    name: build .#${{ matrix.attr }}
    # Namespace large runner (x86_64). The from-source LLVM poles (guest-clang, the
    # kernel's patched LLVM) are RAM/core-bound — they time out on a stock 4-core/
    # 16 GB ubuntu-latest (kernel hit the 6h cap). The nix-heavy profile gives the
    # cores/RAM/disk to land each in ~1-2h. cache.nixos.org still has the full
    # nixos-26.05 x86_64 cache for the native deps.
    runs-on: namespace-profile-nix-heavy
    timeout-minutes: 350 # headroom under the 6h job limit; warm reruns substitute from Cachix
    strategy:
      fail-fast: false
      matrix:
        attr: [guest-clang, kernel]
    steps:
      - uses: actions/checkout@v4

      # Namespace profiles provision ample disk, so the ubuntu-latest preinstalled-
      # toolchain reclaim hack isn't needed here — just record free space.
      - name: Disk free
        run: df -h /

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-26.05
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: cachix/cachix-action@v15
        with:
          name: nix-wasm
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Build .#${{ matrix.attr }}
        run: nix build -L --keep-going '.#${{ matrix.attr }}' --print-out-paths --no-link

  # --- the substitutable artifact set: reuses the cached toolchain via Cachix ---
  artifacts:
    name: build wasm artifacts
    needs: toolchain
    # Namespace small runner: with the toolchain + cross closure cached in Cachix,
    # this job is substitution-only (I/O-bound) plus the cheap top layer (nix.wasm
    # C++ + squashfs/initramfs/image), so the default profile suffices. (Use
    # nix-heavy for the FIRST cold run that has to compile the whole cross closure
    # from source.) Stays off GitHub-hosted minutes (private repo).
    runs-on: namespace-profile-default
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - name: Disk free
        run: df -h /

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-26.05
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: cachix/cachix-action@v15
        with:
          name: nix-wasm
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      # guest-clang/kernel now substitute from Cachix (pushed by the toolchain
      # job); the rest builds on top. wl-eyes is vendored into the repo (#62/#63),
      # so the initramfs and the full linux-image boot bundle build in CI too.
      - name: Build substitutable artifacts
        run: |
          nix build -L --keep-going \
            '.#nix-wasm' \
            '.#wasm-binary-cache' \
            '.#wasm-base-squashfs' \
            '.#wasm-initramfs' \
            '.#linux-image' \
            '.#kernel-mmu' \
            '.#kernel-mmu-a2' \
            '.#mmu-init' \
            '.#mmu-init-a2' \
            --print-out-paths --no-link

      # Acceptance #2 (determinism): a forced rebuild of nix.wasm must reproduce
      # the same output. --rebuild rebuilds just the top derivation and compares.
      - name: Determinism check (.#nix-wasm --rebuild)
        run: nix build -L --rebuild '.#nix-wasm' --no-link

  # --- boot-smoke: actually BOOT the guest and run the in-repo node smokes -----
  # The static gates (runtime-gates.yml) never boot the guest, and the artifacts
  # job above only BUILDS the images. This job substitutes vmlinux.wasm +
  # initramfs.cpio.gz from Cachix and boots them in the Node harness to run the
  # #35 async-signal regression/diagnostic smokes end to end:
  #   • sigalrm-smoke   — the kernel self-armed SIGALRM/itimer/alarm path (#55).
  #   • kill-wake-smoke — the cross-process kill() async-signal wake reproducer
  #     for the `timeout 2 sleep 10` hang (#35), no busybox/networking.
  #   • ping-pace-smoke — #75 regression (GATING; fixed by patches/kernel/0021):
  #     a one-shot SIGALRM handler installed with SA_RESTART (busybox ping via
  #     signal()) must run when it interrupts a blocking syscall. No networking.
  #   • ping-pace-probe-smoke — #75 localizer (non-gating): control/restart/xcpu/
  #     repro/transparent matrix, the detailed breakdown behind ping-pace-smoke.
  #   • vsock-ctl-smoke — the guest /Ctl agent (pcctl) ↔ host listener over
  #     virtio-vsock, open/notify/clipset/clipget round-trip (issue #60 Phase 2).
  #   • resize-smoke   — terminal resize: console.resize() → virtio-console
  #     config-change irq → hvc_resize(), read back via `stty size` (#83 follow-up).
  # A nix:false boot needs only the kernel + initramfs (no squashfs/nix-cache),
  # so this stays a light substitute-and-run job. Each smoke exits 2 on a boot
  # panic (inconclusive) and is retried; 0 pass / 1 fail are terminal.
  boot-smoke:
    name: boot guest + run signal smokes
    needs: toolchain
    runs-on: namespace-profile-default
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Disk free
        run: df -h /

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-26.05
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: cachix/cachix-action@v15
        with:
          name: nix-wasm
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Substitute the two artifacts a busybox-only (nix:false) boot needs.
      - name: Build kernel + initramfs (substitute from Cachix)
        run: |
          mkdir -p .artifacts
          ln -sfn "$(nix build -L '.#kernel' --no-link --print-out-paths)/vmlinux.wasm" \
            .artifacts/vmlinux.wasm
          ln -sfn "$(nix build -L '.#wasm-initramfs' --no-link --print-out-paths)/initramfs.cpio.gz" \
            .artifacts/initramfs.cpio.gz
          ls -lL .artifacts

      - name: Install runtime deps
        working-directory: runtime
        run: bun install --frozen-lockfile

      # Run a smoke up to 3 times, treating exit 2 (boot panic) as retryable.
      # NOTE (#83): every smoke below boots busybox-only and reads its shell over
      # hvc0, which now rides the stock virtio-console driver over 8 single-port
      # virtio-console devices (the bespoke hvc_wasm backend is retired). So this
      # job doubles as the primary-console regression gate: if the console's hvc0
      # registration / input / output broke, none of these smokes would reach a
      # prompt. Multi-tty (hvc1+) needs the full-nix inittab (8 getty lines live in
      # base.squashfs, not the initramfs) and is validated on the PR preview boot.
      - name: Boot smokes (sigalrm + kill-wake + timeout + ping-pace #75 + vsock)
        working-directory: runtime
        env:
          LINUX_WASM_ARTIFACTS: file://${{ github.workspace }}/.artifacts/
        run: |
          run_smoke() {
            local script="$1" attempt rc
            for attempt in 1 2 3; do
              echo "::group::$script (attempt $attempt)"
              set +e
              node "$script"
              rc=$?
              set -e
              echo "::endgroup::"
              if [ "$rc" -eq 0 ]; then return 0; fi
              if [ "$rc" -eq 2 ]; then
                echo "$script inconclusive (boot panic) — retrying"
                continue
              fi
              return "$rc"
            done
            echo "$script still inconclusive after 3 attempts"
            return 2
          }
          run_smoke demo/node/sigalrm-smoke.mjs
          run_smoke demo/node/kill-wake-smoke.mjs
          # #35 regression: `timeout 2 sleep 10` must terminate sleep (now fixed
          # by patches/busybox/0008). Gating — a regression fails the job.
          run_smoke demo/node/timeout-repro-smoke.mjs

          # #75 regression (now fixed by patches/kernel/0021): busybox-ping's
          # pacing — a one-shot SIGALRM handler installed with SA_RESTART must run
          # when it interrupts a blocking syscall. The kernel delivers the handler
          # at the FOOT and TRANSPARENTLY restarts the syscall (real result, no
          # -EINTR). Gating — a regression (the one-packet-then-hang) fails the job.
          run_smoke demo/node/ping-pace-smoke.mjs

          # #75 LOCALIZER (NON-gating diagnostic). Runs control/restart/xcpu/repro/
          # transparent in one boot and prints the matrix. All PASS with the fix;
          # kept non-gating as the detailed breakdown behind the gating
          # ping-pace-smoke above (tolerant of the guest's "PROBE ?:" label quirk).
          echo "::group::ping-pace-probe matrix (#75 localizer, non-gating)"
          set +e
          node demo/node/ping-pace-probe-smoke.mjs
          set -e
          echo "::endgroup::"

          # Issue #60 Phase 2: the guest /Ctl agent (pcctl) ↔ host listener over
          # virtio-vsock — open/notify/clipset/clipget round-trip. Gating.
          run_smoke demo/node/vsock-ctl-smoke.mjs

          # #83 follow-up: terminal RESIZE. console(0).resize() writes cols/rows
          # to the virtio-console config space and raises the device's
          # config-change irq; the stock driver hvc_resize()s the tty. Proven via
          # `stty size`. Gating — a regression (resize not propagating) fails.
          run_smoke demo/node/resize-smoke.mjs

      # #128 Track A software MMU: boot a softmmu-instrumented init under the
      # CONFIG_MMU=y kernel and prove the per-access translate works. A1 (no
      # present check, pages populated at exec) checksums bit-exact; A2 (checked
      # translate, VM_LOCKED/populate dropped) demand-pages an 8 MiB mmap + grows
      # the stack via the __wasm_mmu_fault path. Both substitute their kernels
      # (.#kernel-mmu / .#kernel-mmu-a2) + inits (.#mmu-init / .#mmu-init-a2)
      # from Cachix; the smokes instrument the init at runtime and boot nix:false.
      - name: MMU smokes (#128 software MMU — A1 checksum + A2 demand paging)
        working-directory: runtime
        run: |
          run_smoke() {
            local script="$1"; shift
            local attempt rc
            for attempt in 1 2 3; do
              echo "::group::$script (attempt $attempt)"
              set +e
              env "$@" node "$script"
              rc=$?
              set -e
              echo "::endgroup::"
              if [ "$rc" -eq 0 ]; then return 0; fi
              if [ "$rc" -eq 2 ]; then
                echo "$script inconclusive (boot panic) — retrying"; continue
              fi
              return "$rc"
            done
            echo "$script still inconclusive after 3 attempts"; return 2
          }
          A1K="$(cd .. && nix build -L '.#kernel-mmu' --no-link --print-out-paths)"
          A1I="$(cd .. && nix build -L '.#mmu-init' --no-link --print-out-paths)"
          A2K="$(cd .. && nix build -L '.#kernel-mmu-a2' --no-link --print-out-paths)"
          A2I="$(cd .. && nix build -L '.#mmu-init-a2' --no-link --print-out-paths)"
          # A1: fast-path translate, bit-exact checksum. Gating.
          run_smoke demo/node/mmu-smoke.mjs \
            MMU_VMLINUX="$A1K/vmlinux.wasm" MMU_INIT="$A1I/bin/mmu-init"
          # A2: present-checked translate, demand paging + stack growth. Gating.
          run_smoke demo/node/mmu-smoke-a2.mjs \
            MMU_VMLINUX="$A2K/vmlinux.wasm" MMU_INIT="$A2I/bin/mmu-init-a2"

  # --- nix-boot-smoke: boot the FULL nix system and prove the 9P transport works -
  # The first CI job that boots nix:true (squashfs /nix overlay + the binary cache,
  # both carried over virtio-9p). It is the runtime regression gate for the
  # virtio-device-enum patch fix: if patches 0017-0020 ever drop the 9P device
  # registration again (a silent patch-fuzz hazard the kernel.nix build-time
  # assertion already guards), `9pnet_virtio` finds "no channels available for
  # device pcroot/nixcache" and this boot fails. smoke.mjs reads /mnt/pc (pcroot
  # 9P) and runs `nix-env -iA make` (nixcache 9P substitution) — exercising BOTH
  # 9P channels end to end. Needs the four nix:true artifacts (kernel + initramfs +
  # base.squashfs + wasm-binary-cache); `needs: artifacts` so they are built +
  # pushed to Cachix first and this job substitutes them.
  nix-boot-smoke:
    name: boot full nix system + 9P transport smoke
    needs: [toolchain, artifacts]
    runs-on: namespace-profile-default
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Disk free
        run: df -h /

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-26.05
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: cachix/cachix-action@v15
        with:
          name: nix-wasm
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Assemble the nix:true artifact dir the harness reads (vmlinux.wasm,
      # initramfs.cpio.gz, base.squashfs, nix-cache/). nix-cache/ is the
      # .#wasm-binary-cache tree (served by nix-cache.js over file:// path fetches;
      # readFile follows the store symlinks).
      - name: Assemble nix:true artifacts (substitute from Cachix)
        run: |
          mkdir -p .artifacts-nix
          ln -sfn "$(nix build -L '.#kernel' --no-link --print-out-paths)/vmlinux.wasm" \
            .artifacts-nix/vmlinux.wasm
          ln -sfn "$(nix build -L '.#wasm-initramfs' --no-link --print-out-paths)/initramfs.cpio.gz" \
            .artifacts-nix/initramfs.cpio.gz
          ln -sfn "$(nix build -L '.#wasm-base-squashfs' --no-link --print-out-paths)/base.squashfs" \
            .artifacts-nix/base.squashfs
          ln -sfn "$(nix build -L '.#wasm-binary-cache' --no-link --print-out-paths)" \
            .artifacts-nix/nix-cache
          ls -lL .artifacts-nix

      - name: Install runtime deps
        working-directory: runtime
        run: bun install --frozen-lockfile

      # nix:true boots panic occasionally (exit 2) — retry; 0 pass / 1 fail are
      # terminal. Gating: a 9P-transport regression OR an install regression fails.
      - name: Boot full nix system + nix install smokes
        working-directory: runtime
        env:
          LINUX_WASM_ARTIFACTS: file://${{ github.workspace }}/.artifacts-nix/
        run: |
          run_smoke() {
            local script="$1" attempt rc
            for attempt in 1 2 3; do
              echo "::group::$script (attempt $attempt)"
              set +e
              node "$script"
              rc=$?
              set -e
              echo "::endgroup::"
              if [ "$rc" -eq 0 ]; then return 0; fi
              if [ "$rc" -eq 2 ]; then echo "$script inconclusive (boot panic) — retrying"; continue; fi
              return "$rc"
            done
            echo "$script still inconclusive after 3 attempts"
            return 2
          }
          # 9P transport + legacy `nix-env -iA` substitution (reads /mnt/pc over
          # pcroot 9P, installs make-wasm32 over nixcache 9P).
          run_smoke demo/node/smoke.mjs
          # The new CLI: `nix profile install` of a REAL-derivation catalog entry
          # substitutes its prebuilt output (issue #1 — substitute=true + .drv-aware
          # cache), then compiles + runs a C program. Gating.
          run_smoke demo/node/profile-install-e2e.mjs
          # `nix-env -iA` of the FULL toolchain (guest-clang-wasm32 + guest-cc +
          # guest-cxx) then COMPILES AND RUNS bare clang/clang++/cc/c++ → exit
          # 42/7. Gates two things the other smokes don't: (1) `nix-env -iA`
          # substituting a trivial (`allowSubstitutes = false`) derivation — needs
          # always-allow-substitutes in the guest nix.conf, else nix-env tries to
          # BUILD it and dies "platform mismatch" (#1 follow-up); (2) EXECUTING a
          # freshly-compiled wasm binary in the headless harness (issue #96). Gating.
          run_smoke demo/node/wrapperless-cc-e2e.mjs
          # BUILD derivations FROM SOURCE on the guest (issue #92), not just
          # substitute: a trivial sh-builder, a multi-util sh-builder (PATH=/bin),
          # and a derivation that compiles inline C with the in-guest toolchain →
          # then RUNS the from-source-built binary (exit 42). Proves nix's
          # local-derivation-goal (fork/exec a builder) works on NOMMU wasm via
          # posix_spawn. Gating.
          run_smoke demo/node/build-from-source-e2e.mjs
          # M2/M3a graphics + FFI selftests (issue #88), batched into ONE boot
          # (display-free --selftest binaries baked into the image): glib (gobject +
          # libffi double marshaller), libffi (raw wasm backend), pango (cairo-ft
          # layout), wl-text (freetype/fontconfig/harfbuzz/cairo). Gating.
          run_smoke demo/node/selftests-batch.mjs
          # The HEAVY GTK selftests (issue #88) run one-per-fresh-boot — batching
          # several ~14 MB GTK inits in one boot fragments the NOMMU heap and wedges
          # a later one (they pass fine isolated). gtk-hello (GTK3 type tree via the
          # fpcast seam, M3b), galculator (GTK3 .ui parse + widget class_init, M4),
          # gtk3-widget-factory (GtkBuilder add_callback_symbol autoconnect, #33),
          # gtk3-demo (full GtkApplication, signals wired in C — no GModule).
          # Gating; the retry wrapper covers boot-panic flakes (exit 2).
          run_smoke demo/node/gtk-smoke.mjs
          run_smoke demo/node/galculator-smoke.mjs
          run_smoke demo/node/widget-factory-smoke.mjs
          run_smoke demo/node/gtk-demo-smoke.mjs
