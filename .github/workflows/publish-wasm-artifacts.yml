name: publish-wasm-artifacts

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest        # x86_64-linux: cache.nixos.org has full nixos-26.05 cache
    steps:
      - uses: actions/checkout@v4

      # Reclaim disk in case the wasm closure isn't fully cached yet (cold Cachix).
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost "${AGENT_TOOLSDIRECTORY:-}" || true
          df -h /

      # Install Nix with the nixos-26.05 channel pin. This matches the project's
      # CI caching strategy: 26.05 has a complete x86_64 binary cache (including
      # LLVM 21), so no heavy from-source rebuilds occur. (aarch64 lacks the cache
      # and triggers ~1-2h LLVM compiles — use x86_64 for CI.)
      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-26.05
          extra_nix_config: |
            experimental-features = nix-command flakes

      # Substitute the wasm artifacts (incl. guest-clang/kernel) from the Cachix
      # cache the nix-wasm build CI populated — so this publish job copies prebuilt
      # store paths instead of rebuilding LLVM from source (Phase 5 #2).
      - uses: cachix/cachix-action@v15
        with:
          name: nix-wasm
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      # Install bun so `bunx wrangler` is available in publish-to-r2.sh.
      - uses: oven-sh/setup-bun@v2

      - name: Build wasm artifacts + publish to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        # publish-to-r2.sh prints bytes/sha256/version to stdout; tee appends to
        # the step summary so the values are visible in the Actions UI for the
        # pc registry.js bump (see docs/superpowers/notes/deploy-r2.md).
        run: bash scripts/publish-to-r2.sh | tee -a "$GITHUB_STEP_SUMMARY"
